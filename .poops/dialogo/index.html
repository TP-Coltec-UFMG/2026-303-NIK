<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Diálogos</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e2e; color: #cdd6f4; margin: 0; padding: 20px; }
        h1 { color: #89b4fa; text-align: center; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Botões */
        button, .btn-upload { background-color: #fab387; color: #11111b; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 0.95em; }
        button:hover, .btn-upload:hover { background-color: #f9e2af; }
        .btn-upload { background-color: #89b4fa; display: inline-block; } 
        .btn-upload:hover { background-color: #b4befe; }
        .btn-danger { background-color: #f38ba8; }
        .btn-danger:hover { background-color: #eba0ac; }
        .btn-add-choice { background-color: #a6e3a1; margin-top: 10px; }
        .btn-add-choice:hover { background-color: #94e2d5; }
        .btn-export { background-color: #cba6f7; font-size: 1.1em; padding: 12px 20px; width: 100%; margin-top: 20px;}
        .btn-export:hover { background-color: #f5c2e7; }

        .top-controls { position: fixed; left: 8px; top: calc(100vh - 88px); display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; align-items: start; justify-content: center;}

        /* Estruturas (Árvores) */
        .tree-node { background-color: #313244; padding: 15px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border-left: 5px solid #89b4fa; }
        .tree-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 15px; gap: 15px; flex-wrap: wrap; }
        
        /* Escolhas */
        .choices-container { margin-left: 20px; border-left: 2px dashed #45475a; padding-left: 15px; }
        .choice-node { background-color: #45475a; padding: 15px; border-radius: 6px; margin-bottom: 10px; position: relative; }
        .choice-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .input-group { display: flex; flex-direction: column; flex: 1; min-width: 150px; }
        
        /* Subseções de Tags */
        .tag-section { background-color: #181825; padding: 10px; border-radius: 6px; margin-bottom: 10px; border-left: 3px solid; }
        .tag-section.gerais { border-color: #cba6f7; }
        .tag-section.personagem { border-color: #fab387; }
        .tag-section-title { font-size: 0.8em; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: bold; }
        .tag-section.gerais .tag-section-title { color: #cba6f7; }
        .tag-section.personagem .tag-section-title { color: #fab387; }

        label { font-size: 0.85em; margin-bottom: 4px; color: #a6adc8; }
        input[type="text"] { background-color: #1e1e2e; color: #cdd6f4; border: 1px solid #585b70; padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box; }
        input[type="text"]:focus { outline: none; border-color: #89b4fa; }
        
        .remove-choice { position: absolute; top: 15px; right: 15px; }

        /* Preview */
        pre { background-color: #11111b; padding: 15px; border-radius: 8px; overflow-x: auto; color: #a6e3a1; display: none;}
    </style>
</head>
<body>

<div class="container">
    <h1>Editor de Diálogos</h1>
    
    <div class="top-controls">
        <button onclick="addTree()">➕ Nova Árvore de Diálogo</button>
        <label for="file-upload" class="btn-upload">📁 Carregar JSON Existente</label>
        <input id="file-upload" type="file" accept=".json" style="display: none;" onchange="loadJSON(event)">
    </div>

    <div id="trees-container"></div>

    <button class="btn-export" onclick="exportData()">💾 Exportar para JSON</button>
    <pre id="json-preview"></pre>
</div>

<script>
    const treesContainer = document.getElementById('trees-container');

    function createChoiceHTML() {
        const choiceDiv = document.createElement('div');
        choiceDiv.className = 'choice-node';
        choiceDiv.innerHTML = `
            <button class="btn-danger remove-choice" onclick="this.parentElement.remove()">X</button>
            <div class="choice-row">
                <div class="input-group" style="flex: 2;">
                    <label>Texto da Escolha (O que o jogador diz)</label>
                    <input type="text" class="choice-text" placeholder="Ex: Estou em busca de uma aventura.">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Próxima Árvore (ID)</label>
                    <input type="text" class="choice-next" placeholder="Ex: npc_conversa_02">
                </div>
            </div>
            
            <div class="tag-section gerais">
                <div class="tag-section-title">Tags Gerais (Mundo / Quests)</div>
                <div class="choice-row">
                    <div class="input-group">
                        <label>Necessárias (,)</label>
                        <input type="text" class="choice-req-tags" placeholder="Ex: mago">
                    </div>
                    <div class="input-group">
                        <label>Proibidas (,)</label>
                        <input type="text" class="choice-forbid-tags" placeholder="Ex: cometeu_crime">
                    </div>
                    <div class="input-group">
                        <label>Adicionadas (,)</label>
                        <input type="text" class="choice-add-tags" placeholder="Ex: quest_aceita">
                    </div>
                </div>
            </div>

            <div class="tag-section personagem">
                <div class="tag-section-title">Tags de Relacionamento</div>
                <div class="choice-row">
                    <div class="input-group">
                        <label>Necessárias (,)</label>
                        <input type="text" class="choice-char-req-tags" placeholder="Ex: amigo">
                    </div>
                    <div class="input-group">
                        <label>Proibidas (,)</label>
                        <input type="text" class="choice-char-forbid-tags" placeholder="Ex: inimigo">
                    </div>
                    <div class="input-group">
                        <label>Adicionadas (,)</label>
                        <input type="text" class="choice-char-add-tags" placeholder="Ex: se_apresentou">
                    </div>
                </div>
            </div>
        `;
        return choiceDiv;
    }

    function addTree() {
        const treeDiv = document.createElement('div');
        treeDiv.className = 'tree-node';
        treeDiv.innerHTML = `
            <div class="tree-header">
                <div class="input-group" style="flex: 1; min-width: 150px;">
                    <label style="color: #89b4fa; font-weight: bold;">ID da Árvore:</label>
                    <input type="text" class="tree-id-input" placeholder="Ex: npc_01">
                </div>
                <div class="input-group" style="flex: 1; min-width: 150px;">
                    <label style="color: #fab387; font-weight: bold;">Personagem:</label>
                    <input type="text" class="tree-char-input" placeholder="Ex: Rei Paulo">
                </div>
                <div class="input-group" style="flex: 2; min-width: 250px;">
                    <label style="color: #a6e3a1; font-weight: bold;">Texto / Fala:</label>
                    <input type="text" class="tree-text-input" placeholder="Ex: Olá, viajante!">
                </div>
                <button class="btn-danger" onclick="this.parentElement.parentElement.remove()" style="height: 38px;">Remover</button>
            </div>
            <div class="choices-container"></div>
            <button class="btn-add-choice" onclick="addChoiceToTree(this)">+ Adicionar Escolha</button>
        `;
        treesContainer.appendChild(treeDiv);
        return treeDiv;
    }

    function addChoiceToTree(button) {
        const choicesContainer = button.previousElementSibling;
        choicesContainer.appendChild(createChoiceHTML());
    }

    function parseTags(inputString) {
        return inputString ? inputString.split(',').map(s => s.trim()).filter(s => s !== "") : [];
    }

    function exportData() {
        const treesData = [];
        const treeNodes = document.querySelectorAll('.tree-node');

        treeNodes.forEach(treeNode => {
            const treeId = treeNode.querySelector('.tree-id-input').value.trim();
            const treeChar = treeNode.querySelector('.tree-char-input').value.trim();
            const treeTexto = treeNode.querySelector('.tree-text-input').value.trim();
            const escolhasData = [];
            
            const choiceNodes = treeNode.querySelectorAll('.choice-node');
            choiceNodes.forEach(choiceNode => {
                escolhasData.push({
                    texto: choiceNode.querySelector('.choice-text').value.trim(),
                    tags_necessarias: parseTags(choiceNode.querySelector('.choice-req-tags').value),
                    tags_proibidas: parseTags(choiceNode.querySelector('.choice-forbid-tags').value),
                    tags_adicionadas: parseTags(choiceNode.querySelector('.choice-add-tags').value),
                    tags_personagem_necessarias: parseTags(choiceNode.querySelector('.choice-char-req-tags').value),
                    tags_personagem_proibidas: parseTags(choiceNode.querySelector('.choice-char-forbid-tags').value),
                    tags_personagem_adicionadas: parseTags(choiceNode.querySelector('.choice-char-add-tags').value),
                    proxima_arvore: choiceNode.querySelector('.choice-next').value.trim()
                });
            });

            treesData.push({ id: treeId, personagem: treeChar, texto: treeTexto, escolhas: escolhasData });
        });

        const jsonString = JSON.stringify(treesData, null, 4);
        const previewEl = document.getElementById('json-preview');
        previewEl.style.display = 'block';
        previewEl.textContent = jsonString;

        const blob = new Blob([jsonString], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'dialogos.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function loadJSON(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const loadedData = JSON.parse(e.target.result);
                treesContainer.innerHTML = '';
                
                loadedData.forEach(treeData => {
                    const treeDiv = addTree();
                    treeDiv.querySelector('.tree-id-input').value = treeData.id || '';
                    treeDiv.querySelector('.tree-char-input').value = treeData.personagem || '';
                    treeDiv.querySelector('.tree-text-input').value = treeData.texto || '';

                    const choicesContainer = treeDiv.querySelector('.choices-container');
                    
                    if (treeData.escolhas) {
                        treeData.escolhas.forEach(choiceData => {
                            const choiceDiv = createChoiceHTML();
                            choiceDiv.querySelector('.choice-text').value = choiceData.texto || '';
                            choiceDiv.querySelector('.choice-next').value = choiceData.proxima_arvore || '';
                            
                            // Gerais
                            choiceDiv.querySelector('.choice-req-tags').value = (choiceData.tags_necessarias || []).join(', ');
                            choiceDiv.querySelector('.choice-forbid-tags').value = (choiceData.tags_proibidas || []).join(', ');
                            choiceDiv.querySelector('.choice-add-tags').value = (choiceData.tags_adicionadas || []).join(', ');
                            
                            // Personagem
                            choiceDiv.querySelector('.choice-char-req-tags').value = (choiceData.tags_personagem_necessarias || []).join(', ');
                            choiceDiv.querySelector('.choice-char-forbid-tags').value = (choiceData.tags_personagem_proibidas || []).join(', ');
                            choiceDiv.querySelector('.choice-char-add-tags').value = (choiceData.tags_personagem_adicionadas || []).join(', ');
                            
                            choicesContainer.appendChild(choiceDiv);
                        });
                    }
                });
            } catch (error) {
                alert("Erro ao ler o JSON!\n" + error);
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    addTree();
</script>

</body>
</html>
